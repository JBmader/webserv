# ─── Webserv Default Configuration ────────────────────────────────────────────

# Server 1: Main website on port 8080
server {
	listen 8080;
	server_name localhost;
	client_max_body_size 10M;

	error_page 400 www/errors/400.html;
	error_page 403 www/errors/403.html;
	error_page 404 www/errors/404.html;
	error_page 405 www/errors/405.html;
	error_page 413 www/errors/413.html;
	error_page 500 www/errors/500.html;

	# Default location
	location / {
		root www;
		index index.html;
		methods GET POST DELETE;
		autoindex off;
	}

	# Upload location
	location /upload {
		root www/upload;
		methods GET POST DELETE;
		autoindex on;
		upload_path www/upload;
	}

	# CGI location
	location /cgi-bin {
		root cgi-bin;
		methods GET POST;
		cgi_ext .py;
		cgi_path /usr/bin/python3;
	}

	# Directory listing demo
	location /files {
		root www;
		methods GET;
		autoindex on;
	}

	# Redirect demo
	location /old-page {
		return 301 /;
	}
}

# Server 2: Second website on port 8081
server {
	listen 8081;
	server_name localhost;
	client_max_body_size 1M;

	location / {
		root www;
		index index.html;
		methods GET;
		autoindex off;
	}
}
