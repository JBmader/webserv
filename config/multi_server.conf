# Test config: multiple servers on different ports with different content
# Eval: "Setup multiple servers with different port"

server {
	listen 8080;
	server_name localhost;
	client_max_body_size 10M;

	error_page 404 www/errors/404.html;

	location / {
		root www;
		index index.html;
		methods GET POST DELETE;
		autoindex off;
	}

	location /upload {
		root www/upload;
		methods GET POST DELETE;
		autoindex on;
		upload_path www/upload;
	}

	location /cgi-bin {
		root cgi-bin;
		methods GET POST;
		cgi_ext .py;
		cgi_path /usr/bin/python3;
	}

	location /old-page {
		return 301 /;
	}
}

# Second server: different port, different root
server {
	listen 8081;
	server_name localhost;
	client_max_body_size 1M;

	location / {
		root www;
		index index.html;
		methods GET;
		autoindex off;
	}
}

# Third server: different hostname on same port as server 1
# Test with: curl --resolve example.com:8080:127.0.0.1 http://example.com:8080/
server {
	listen 8080;
	server_name example.com;
	client_max_body_size 1M;

	location / {
		root www/errors;
		index 404.html;
		methods GET;
		autoindex on;
	}
}
