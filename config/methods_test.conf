# Test config: method restrictions per route
# Eval: "Setup a list of methods accepted for a certain route"

server {
	listen 8080;
	server_name localhost;
	client_max_body_size 10M;

	error_page 404 www/errors/404.html;
	error_page 405 www/errors/405.html;

	# GET only route
	location / {
		root www;
		index index.html;
		methods GET;
		autoindex off;
	}

	# All methods
	location /upload {
		root www/upload;
		methods GET POST DELETE;
		autoindex on;
		upload_path www/upload;
	}

	# POST only (no DELETE)
	location /cgi-bin {
		root cgi-bin;
		methods GET POST;
		cgi_ext .py;
		cgi_path /usr/bin/python3;
	}

	# No DELETE allowed -- test: curl -X DELETE should give 405
	location /protected {
		root www;
		methods GET;
	}
}
